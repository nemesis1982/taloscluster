apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: servermanager
  namespace: servermanager
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 15.38.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 5m
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  timeout: 20m
  values:
    image:
      repository: ghcr.io/danielv123/servermanager
      tag: snyk-fix-0f7330f47a4eba7149b86f07a6937c1d
      pullPolicy: IfNotPresent
    securityContext:
      container:
        readOnlyRootFilesystem: false
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
    credentials:
      minio:
        type: s3
        url: "${S3_URL}"
        bucket: "taloscluster"
        accessKey: "${S3_ACCESKEY}"
        secretKey: "${S3_SECRETKEY}"
        encrKey: "${S3_ENC}"
    service:
      main:
        ports:
          main:
            port: 8080
            targetPort: 8080
    ingress:
      main:
        enabled: true
        ingressClassName: internal
        integrations:
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod
          homepage:
            enabled: true
            group: "Management"
            weight: 100
        hosts:
          - host: servermanager.${DOMAIN_0}
    resources:
      limits:
        cpu: 1000m
        memory: 4Gi
    persistence:
      config:
        enabled: true
        mountPath: /usr/src/app/data
        volsync:
        - name: config
          type: restic
          credentials: minio
          dest:
            enabled: true
          src:
            enabled: true
    workload:
      main:
        podSpec:
          containers:
            main:
              probes:
                liveness:
                  path: "/ping"
                readiness:
                  path: "/ping"
                startup:
                  path: "/ping"
