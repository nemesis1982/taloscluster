---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
  namespace: plex
spec:
  interval: 15m
  chart:
    spec:
      chart: plex
      version: 21.6.1
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 45m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    TZ: Europe/Amsterdam

    global:
      stopAll: false

    plex:
      # User Defined
      serverIP: "${PLEX_IP}"
      additionalAdvertiseURL: "" # https://${IP_PLEX}:32400, https://${DOMAIN}:443, https://${DOMAIN}:32400   <-- configured automaticly
      disableGDM: true
      requireHTTPS: false # First Deploy set to false, till remote acces is configured and working

    credentials:
      minio:
        type: s3
        url: "${S3_URL}"
        bucket: "taloscluster"
        accessKey: "${S3_ACCESKEY}"
        secretKey: "${S3_SECRETKEY}"
        encrKey: "${S3_ENC}"

    service:
      main:
        type: LoadBalancer
        loadBalancerIP: ${PLEX_IP}
        integrations:
          metallb:
            enabled: true

    ingress:
      main:
        enabled: true
        ingressClassName: external
        annotations:
          nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
        hosts:
          - host: plex-backup.${DOMAIN_0}
        integrations:
          certManager:
            enabled: true
            certificateIssuer: domain-1-le-prod
#          homepage:
#            enabled: true
#            group: "Media"
#            widget:
#              custom:
#                key: "${HP_API_PLEX}"

    persistence:
      config:
        volsync:
          - name: config
            type: restic
            credentials: minio
            dest: #VolSync Destination (Restore)
              enabled: true
            src: #VolSync Source (Backup)
              enabled: true
      ssdsafe:
        enabled: true
        type: nfs
        server: ${NFS_IP}
        path: ${NFS_PATH_SSDSAFE_RIPTIDE}
        mountPath: /riptide/ssdsafe
      videosafe:
        enabled: true
        type: nfs
        server: ${NFS_IP}
        path: ${NFS_PATH_VIDEOSAFE_RIPTIDE}
        mountPath: /riptide/videosafe
      videounsafe:
        enabled: true
        type: nfs
        server: ${NFS_IP}
        path: ${NFS_PATH_VIDEOUNSAFE_RIPTIDE}
        mountPath: /riptide/videounsafe
      videounsafe2:
        enabled: true
        type: nfs
        server: ${NFS_IP}
        path: ${NFS_PATH_VIDEOUNSAFE2_RIPTIDE}
        mountPath: /riptide/videounsafe2