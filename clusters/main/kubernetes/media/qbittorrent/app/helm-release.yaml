---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent
  namespace: qbittorrent
spec:
  interval: 30m
  chart:
    spec:
      chart: qbittorrent
      version: 24.5.1
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 30m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    qbitportforward:
      enabled: true
      QBT_USERNAME: "${QBIT_ADMIN_USER}"
      QBT_PASSWORD: "${QBIT_ADMIN_PASSWORD}"
    addons:
      gluetun:
        enabled: true
        container:
          resources:
            limits:
              truecharts.org/tun: 1
          killSwitch: true
          excludedNetworks_IPv4:
            - "192.168.0.0/24"
            - "10.10.0.0/16"
            - "172.0.0.0/8"
          excludedNetworks_IPv6: []
          env:
            VPN_SERVICE_PROVIDER: "protonvpn"
            VPN_TYPE: "openvpn"
            OPENVPN_USER: "${OPEN_VPN_USER}"
            OPENVPN_PASSWORD: "${OPEN_VPN_PASSWORD}"
            VPN_PORT_FORWARDING: true
            PORT_FORWARD_ONLY: true
            FIREWALL_INPUT_PORTS: 10095,8000
            SERVER_COUNTRIES: Switzerland
            TOR_ONLY: false
    ingress:
      main:
        enabled: true
        ingressClassName: "internal"
        hosts:
          - host: qbit.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          homepage:
            enabled: true
            group: "Media Downloads"
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod

    credentials:
      minio:
        type: s3
        url: "${S3_URL}"
        bucket: "taloscluster"
        accessKey: "${S3_ACCESKEY}"
        secretKey: "${S3_SECRETKEY}"
        encrKey: "${S3_ENC}"

    persistence:
      config:
        volsync:
          - name: config
            type: restic
            credentials: minio
            dest:
              enabled: true
            src:
              enabled: true
      download:
        enabled: true
        type: nfs
        path: ${NFS_2_PATH_DOWNLOAD}
        mountPath: /download
        server: ${NFS_2_IP}
      ssdsafe:
        enabled: true
        type: nfs
        server: ${NFS_IP}
        path: ${NFS_PATH_SSDSAFE_RIPTIDE}
        mountPath: /riptide/ssdsafe
      videosafe:
        enabled: true
        type: nfs
        server: ${NFS_IP}
        path: ${NFS_PATH_VIDEOSAFE_RIPTIDE}
        mountPath: /riptide/videosafe
      videounsafe:
        enabled: true
        type: nfs
        server: ${NFS_IP}
        path: ${NFS_PATH_VIDEOUNSAFE_RIPTIDE}
        mountPath: /riptide/videounsafe
      videounsafe2:
        enabled: true
        type: nfs
        server: ${NFS_IP}
        path: ${NFS_PATH_VIDEOUNSAFE2_RIPTIDE}
        mountPath: /riptide/videounsafe2