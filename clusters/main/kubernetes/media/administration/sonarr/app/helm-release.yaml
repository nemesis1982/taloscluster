---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sonarr
  namespace: sonarr
spec:
  interval: 15m
  chart:
    spec:
      chart: sonarr
      version: 26.0.1
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    ingress:
      main:
        enabled: true
        ingressClassName: internal
        hosts:
          - host: sonarr.${DOMAIN_0}
        integrations:
          homepage:
            enabled: true
            group: "Arr"
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod
            
    credentials:
      minio:
        type: s3
        url: "${S3_URL}"
        bucket: "taloscluster"
        accessKey: "${S3_ACCESKEY}"
        secretKey: "${S3_SECRETKEY}"
        encrKey: "${S3_ENC}"

    persistence:
      config:
        volsync:
          - name: config
            type: restic
            credentials: minio
            dest:
              enabled: true
            src:
              enabled: true
      ssdsafe:
        enabled: true
        type: nfs
        server: ${NFS_IP}
        path: ${NFS_PATH_SSDSAFE_RIPTIDE}
        mountPath: /riptide/ssdsafe
      videosafe:
        enabled: true
        type: nfs
        server: ${NFS_IP}
        path: ${NFS_PATH_VIDEOSAFE_RIPTIDE}
        mountPath: /riptide/videosafe
      videounsafe:
        enabled: true
        type: nfs
        server: ${NFS_IP}
        path: ${NFS_PATH_VIDEOUNSAFE_RIPTIDE}
        mountPath: /riptide/videounsafe