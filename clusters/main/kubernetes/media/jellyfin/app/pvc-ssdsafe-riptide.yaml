apiVersion: v1
kind: PersistentVolume
metadata:
  name: ssdsafe-riptide-nfs-pv
  namespace: jellyfin
spec:
  storageClassName: ssdsafe-riptide-nfs
  capacity:
    storage: 1Mi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: ${NFS_IP}
    path: ${NFS_PATH_SSDSAFE_RIPTIDE}
  mountOptions:
    - nfsvers=4
    - tcp
    - intr
    - hard
    - noatime
    - nodiratime
    - nolock
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ssdsafe-riptide-nfs-pvc
  namespace: jellyfin
spec:
  storageClassName: ssdsafe-riptide-nfs
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Mi