apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: daisybackend
  namespace: daisybackend
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 15.38.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 5m
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  timeout: 20m
  values:
    image:
      repository: registry.riptide.live/daisyapp-server
      tag: latest
      pullPolicy: IfNotPresent
    securityContext:
      container:
        readOnlyRootFilesystem: false
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0

    credentials:
      minio:
        type: s3
        url: "${S3_URL}"
        bucket: "taloscluster"
        accessKey: "${S3_ACCESKEY}"
        secretKey: "${S3_SECRETKEY}"
        encrKey: "${S3_ENC}"

    service:
      main:
        ports:
          main:
            port: 3001
            targetPort: 16081
    #ingress:
    #  main:
    #    enabled: true
    #    ingressClassName: external
    #    integrations:
    #      certManager:
    #        enabled: true
    #        certificateIssuer: domain-0-le-prod
    #    hosts:
    #      - host: daisybackend.${DOMAIN_0}
    resources:
      limits:
        cpu: 100m
        memory: 4Gi

    persistence:
      data:
        enabled: true
        mountPath: /app/data
        volsync:
        - name: data
          type: restic
          credentials: minio
          dest:
            enabled: true
          src:
            enabled: true
            trigger:
              schedule: 10 1 * * *

    workload:
      main:
        replicas: 1
        podSpec:
          containers:
            main:
              env:
                VITE_API_URL: http://daisybackend.${DOMAIN_0}
                PORT: 3001
                JWT_SECRET: change-me-in-production
                ADMIN_EMAIL: admin@example.com
                ADMIN_NAME: admin
                ADMIN_PASSWORD: Th1sIs@dm1n@cc3ss!
                DB_PATH: /app/data/daisy.db