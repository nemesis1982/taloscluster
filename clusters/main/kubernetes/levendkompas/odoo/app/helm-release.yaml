---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: odoo
  namespace: odoo
spec:
  interval: 15m
  chart:
    spec:
      chart: odoo
      version: 23.4.1
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    TZ: Europe/Amsterdam

    credentials:
      minio:
        type: s3
        url: "${S3_URL}"
        bucket: "taloscluster"
        accessKey: "${S3_ACCESKEY}"
        secretKey: "${S3_SECRETKEY}"
        encrKey: "${S3_ENC}"

    ingress:
      main:
        enabled: true
        ingressClassName: internal
        hosts:
          - host: odoo.${DOMAIN_1}
        integrations:
          certManager:
            enabled: true
            certificateIssuer: domain-1-le-prod

    persistence:
      odoo:
        volsync:
          - name: odoo
            type: restic
            credentials: minio
            dest:
              enabled: true
            src:
              enabled: true
              trigger:
                schedule: 10 1 * * *
      addons:
        volsync:
          - name: addons
            type: restic
            credentials: minio
            dest:
              enabled: true
            src:
              enabled: true
              trigger:
                schedule: 10 1 * * *
      odoo-config:
        enabled: true
        type: configmap
        objectName: odoo-config
        targetSelector:
          main:
            main:
              mountPath: /etc/odoo/odoo.conf
              subPath: odoo.conf
              readOnly: true
            init-db:
              mountPath: /etc/odoo/odoo.conf
              subPath: odoo.conf
              readOnly: true
