apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nsxlibrarymanager
  namespace: nsxlibrarymanager
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 15.38.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 5m
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  timeout: 20m
  values:
    image:
      repository: ghcr.io/ivaano/nsxlibrarymanager
      tag: latest
      pullPolicy: IfNotPresent
    securityContext:
      container:
        readOnlyRootFilesystem: false
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
    credentials:
      minio:
        type: s3
        url: "${S3_URL}"
        bucket: "taloscluster"
        accessKey: "${S3_ACCESKEY}"
        secretKey: "${S3_SECRETKEY}"
        encrKey: "${S3_ENC}"
    service:
      main:
        ports:
          main:
            port: 8080
            targetPort: 8080
    ingress:
      main:
        enabled: true
        ingressClassName: internal
        integrations:
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod
        hosts:
          - host: switch.${DOMAIN_0}
    resources:
      limits:
        cpu: 1000m
        memory: 4Gi
    persistence:
      config:
        enabled: true
        mountPath: /app/config
        volsync:
        - name: config
          type: restic
          credentials: minio
          dest:
            enabled: true
          src:
            enabled: true
      appdb:
        enabled: true
        mountPath: /app/data
        volsync:
        - name: appdb
          type: restic
          credentials: minio
          dest:
            enabled: true
          src:
            enabled: true
      library:
        enabled: true
        type: nfs
        server: ${NFS_IP}
        path: ${NFS_APP}/switch/library
        mountPath: /app/library
      renamer:
        enabled: true
        type: nfs
        server: ${NFS_IP}
        path: ${NFS_APP}/switch/renamer
        mountPath: /app/renamer
      backup:
        enabled: true
        type: nfs
        server: ${NFS_IP}
        path: ${NFS_APP}/switch/backup
        mountPath: /app/backup
    workload:
      main:
        podSpec:
          containers:
            main:
              probes:
                liveness:
                  path: "/ping"
                readiness:
                  path: "/ping"
                startup:
                  path: "/ping"
